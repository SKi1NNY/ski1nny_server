version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skinny-api
    environment:
      APP_NAME: ${APP_NAME:-Skinny API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENV: ${APP_ENV:-local}
      DEBUG: ${DEBUG:-true}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-skinny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skinny}
      POSTGRES_DB: ${POSTGRES_DB:-skinny}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://skinny:skinny@postgres:5432/skinny}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-skinny-ingredients}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT:-us-east-1}
      OCR_PROVIDER: ${OCR_PROVIDER:-google-cloud-vision}
      OCR_TRANSPORT: ${OCR_TRANSPORT:-rest}
      OCR_TIMEOUT_SECONDS: ${OCR_TIMEOUT_SECONDS:-15}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    container_name: skinny-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skinny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skinny}
      POSTGRES_DB: ${POSTGRES_DB:-skinny}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skinny} -d ${POSTGRES_DB:-skinny}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skinny-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
